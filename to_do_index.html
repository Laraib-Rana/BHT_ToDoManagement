<!DOCTYPE html>
<html lang="en" data-bs-theme="light" id="app-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced To-Do System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .completed-task { text-decoration: line-through; opacity: 0.6; }
        .list-group-item { cursor: grab; transition: transform 0.2s ease, background-color 0.2s ease; }
        .list-group-item:active { cursor: grabbing; }
        .list-group-item.dragging { opacity: 0.4; background-color: rgba(13, 110, 253, 0.1) !important; }

        body {
        transition: background-color 0.3s ease, color 0.3s ease;
    }

    .completed-task { 
        text-decoration: line-through; 
        opacity: 0.5; 
    }
    
    .list-group-item { 
        cursor: grab; 
        transition: transform 0.2s ease, background-color 0.2s ease; 
    }
    .list-group-item:active { 
        cursor: grabbing; 
    }
    .list-group-item.dragging { 
        opacity: 0.4; 
        background-color: rgba(13, 110, 253, 0.1) !important; 
    }

    [data-bs-theme="dark"] body {
        background-color: #12141c !important;
    }
    
    [data-bs-theme="dark"] .card {
        background-color: #1a1d29;
        border: 1px solid #2d3248 !important;
    }

    [data-bs-theme="dark"] .list-group-item {
        background-color: #1a1d29;
        color: #f8f9fa;
        border-color: #2d3248;
    }

    [data-bs-theme="dark"] .list-group-item.bg-body-tertiary {
        background-color: #151722 !important;
    }
        </style>
</head>
<body class="bg-light text-dark">

    <div class="container py-5" style="max-width: 750px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-1 fw-bold">Advanced Workspace</h1>
                <p class="text-muted small mb-0">Full-Feature Task Management System</p>
            </div>
            <button id="theme-toggle" class="btn btn-outline-secondary btn-sm">🌙 Dark Mode</button>
        </div>

        <div class="row g-3 mb-4 text-center">
            <div class="col-6 col-md-3">
                <div class="card shadow-sm border-0 bg-primary text-white">
                    <div class="card-body p-3">
                        <h6 class="card-subtitle small opacity-75">Total</h6>
                        <h3 id="stat-total" class="fw-bold mb-0">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card shadow-sm border-0 bg-warning text-dark">
                    <div class="card-body p-3">
                        <h6 class="card-subtitle small opacity-75">Pending</h6>
                        <h3 id="stat-active" class="fw-bold mb-0">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card shadow-sm border-0 bg-success text-white">
                    <div class="card-body p-3">
                        <h6 class="card-subtitle small opacity-75">Completed</h6>
                        <h3 id="stat-completed" class="fw-bold mb-0">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card shadow-sm border-0 bg-info text-dark">
                    <div class="card-body p-3">
                        <h6 class="card-subtitle small opacity-75">Progress</h6>
                        <h3 id="stat-progress" class="fw-bold mb-0">0%</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm mb-4 border-0">
            <div class="card-body p-4">
                <form id="task-form">
                    <div class="input-group mb-3">
                        <input type="text" id="task-input" class="form-control form-control-lg" placeholder="Create a new task..." required>
                        <button class="btn btn-primary px-4" type="submit">Add Task</button>
                    </div>
                    <div class="row g-2">
                        <div class="col-md-6">
                            <label class="form-label small text-muted mb-1">Priority Level</label>
                            <select id="task-priority" class="form-select">
                                <option value="Low">🟢 Low Priority</option>
                                <option value="Medium" selected>🟡 Medium Priority</option>
                                <option value="High">🔴 High Priority</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted mb-1">Due Date</label>
                            <input type="date" id="task-date" class="form-control">
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="row g-2 mb-3 align-items-center">
            <div class="col-md-6">
                <input type="text" id="search-input" class="form-control" placeholder="🔍 Search tasks by title...">
            </div>
            <div class="col-md-6 d-flex justify-content-md-end gap-1">
                <button class="btn btn-sm btn-outline-primary active filter-btn" data-filter="all">All</button>
                <button class="btn btn-sm btn-outline-primary filter-btn" data-filter="active">Active</button>
                <button class="btn btn-sm btn-outline-primary filter-btn" data-filter="completed">Completed</button>
            </div>
        </div>

        <p class="text-muted small mb-2"><span class="badge bg-secondary">Tip</span> Drag and drop tasks to manually reorder them.</p>

        <ul id="task-list" class="list-group shadow-sm mb-5">
            </ul>
    </div>

    <script src="to_do_app.js"></script>
</body>
</html>
